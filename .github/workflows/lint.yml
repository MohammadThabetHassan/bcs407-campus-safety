name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff lint
        run: ruff check code/ --select E,F,W --ignore E501

      - name: Run ruff format check
        run: ruff format --check code/

      - name: Verify Python scripts compile
        run: python -m py_compile code/setup_v2.py code/augment_v2.py code/inference.py

      - name: Verify training shell script syntax
        run: bash -n code/train_v2.sh
